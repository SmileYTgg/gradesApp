<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Статистика балів учнів</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: row;
    }

    #left, #right {
        width: 50%;
        padding: 20px;
        overflow-y: auto;
    }

    #left {
        background: #f0f7ff;
        border-right: 3px solid #c7ddff;
    }

    #right {
        background: #ffffff;
    }

    @media (max-width: 800px) {
        body {
            flex-direction: column;
        }
        #left, #right {
            width: 100%;
            border-right: none;
            border-bottom: 3px solid #c7ddff;
        }
    }

    h1 {
        margin-top: 0;
        color: #2a4d8f;
    }

    .student-block {
        margin-bottom: 20px;
        padding: 12px;
        border-radius: 8px;
        background: #ffffff;
        border: 1px solid #bcd0ff;
    }

    input, textarea {
        width: 100%;
        padding: 6px;
        margin-top: 5px;
        border-radius: 4px;
        border: 1px solid #8fb3ff;
    }

    button {
        padding: 8px 14px;
        margin-top: 10px;
        cursor: pointer;
        background: #2a4d8f;
        color: white;
        border: none;
        border-radius: 4px;
    }

    #clearBtn {
        background: #b30000;
        margin-left: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    th {
        background: #2a4d8f;
        color: white;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }

    tr:nth-child(even) {
        background: #eef3ff;
    }
</style>
</head>
<body>

<div id="left">
    <h1>Введення балів</h1>
    <div id="students"></div>
    <button onclick="addStudent()">Додати учня</button>
    <button id="clearBtn" onclick="clearData()">Очистити дані</button>
</div>

<div id="right">
    <h1>Результати</h1>
    <table id="resultsTable">
        <thead>
            <tr>
                <th>Учень</th>
                <th>Середній бал</th>
                <th>Мін</th>
                <th>Макс</th>
                <th>Кількість</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let studentCount = 0;

/* ---------------- COOKIE HELPERS ---------------- */

function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + (days*24*60*60*1000));
    document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/";
}

function getCookie(name) {
    const decoded = decodeURIComponent(document.cookie);
    const parts = decoded.split("; ");
    for (let p of parts) {
        if (p.startsWith(name + "=")) {
            return p.substring(name.length + 1);
        }
    }
    return "";
}

/* ---------------- MAIN FUNCTIONS ---------------- */

function addStudent(name = "", scores = "") {
    studentCount++;
    const div = document.createElement("div");
    div.className = "student-block";
    div.innerHTML = `
        <label><b>Ім'я учня ${studentCount}:</b></label>
        <input type="text" class="name" value="${name}" oninput="calculate()">

        <label>Бали (через кому):</label>
        <textarea class="scores" rows="2" oninput="calculate()">${scores}</textarea>
    `;
    document.getElementById("students").appendChild(div);
    calculate();
}

function calculate() {
    const blocks = document.querySelectorAll(".student-block");
    let results = [];
    let saveData = [];

    blocks.forEach(block => {
        const name = block.querySelector(".name").value.trim();
        const raw = block.querySelector(".scores").value;

        saveData.push({ name, scores: raw });

        if (!name) return;

        const nums = raw.split(",")
                        .map(x => parseFloat(x.trim()))
                        .filter(x => !isNaN(x));

        if (nums.length === 0) return;

        const avg = nums.reduce((a,b)=>a+b,0) / nums.length;

        results.push({
            name,
            avg,
            min: Math.min(...nums),
            max: Math.max(...nums),
            count: nums.length
        });
    });

    // Save to cookies for 7 days
    setCookie("students", JSON.stringify(saveData), 7);

    // Sort by best average
    results.sort((a,b) => b.avg - a.avg);

    const tbody = document.querySelector("#resultsTable tbody");
    tbody.innerHTML = "";

    results.forEach(r => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${r.name}</td>
            <td>${r.avg.toFixed(2)}</td>
            <td>${r.min}</td>
            <td>${r.max}</td>
            <td>${r.count}</td>
        `;
        tbody.appendChild(row);
    });
}

function clearData() {
    if (!confirm("Ви впевнені, що хочете очистити всі дані?")) return;

    setCookie("students", "", -1); // delete cookie
    document.getElementById("students").innerHTML = "";
    studentCount = 0;
    addStudent();
}

/* ---------------- LOAD SAVED DATA ---------------- */

function loadSaved() {
    const saved = getCookie("students");
    if (!saved) {
        addStudent();
        return;
    }

    try {
        const arr = JSON.parse(saved);
        arr.forEach(s => addStudent(s.name, s.scores));
    } catch {
        addStudent();
    }
}

/* ---------------- MOBILE DETECTION ---------------- */

function detectMobile() {
    const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(navigator.userAgent);
    if (isMobile) {
        document.body.style.flexDirection = "column";
        document.getElementById("left").style.width = "100%";
        document.getElementById("right").style.width = "100%";
        document.getElementById("left").style.borderRight = "none";
        document.getElementById("left").style.borderBottom = "3px solid #c7ddff";
    }
}

detectMobile();
loadSaved();
</script>

</body>
</html>
